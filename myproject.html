<!DOCTYPE html>
<html>
<head>
<style>
  #dd{
    background: black;
    color: white;
  }
</style>
<title>My Database</title>

<script type="module"> 
import { getDocs} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "skywork-library.firebaseapp.com",
  projectId: "skywork-library"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ MAIN FUNCTION
async function submit() {
  const age = document.querySelector('#age').value;

  if (age.length < 2) {
    alert('Age must be valid');
    return;
  }

  try {
    const docm = await addDoc(collection(db, "Gender"), {
      age: age
    });

    console.log("Document ID:", docm.id);
    alert("Data added successfully");

    document.querySelector('#me').innerHTML = `age: ${age} <br> ID: ${docm.id}`;

  } catch (error) {
    console.error(error);
    alert(error.message);
  }
}

// ✅ CONNECT BUTTON AFTER PAGE LOAD
window.addEventListener("DOMContentLoaded", () => {
  document.querySelector('#click').addEventListener('click', submit);
});

window.readData = readData;
  async function readData() {
  const querySnapshot = await getDocs(collection(db, "Gender"));

  let output = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    output += `
     <div id="dd"> <p>
        ID: ${doc.id} <br>
        Age: ${data.age}
      </p>
      </div>
    `;
  });

  document.querySelector("#dt").innerHTML = output;
}
</script>

</head>

<body>

<h2>Firebase Test</h2>

<input type="number" id="age" placeholder="Enter age">
<button id="click">Submit</button>
  <button onclick="readData();">Show data</button>

<h1 id="me"></h1>
  <h2 id="dt"></h2>

</body>
</html>
