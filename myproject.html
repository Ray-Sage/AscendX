<!DOCTYPE html>
<html>
<head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "skywork-library.firebaseapp.com",
  projectId: "skywork-library"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function submit() {
  const age = document.querySelector('#age').value;

  if (age.length < 2) {
    alert('Age must be valid');
  } else {
   const docm = await addDoc(collection(db, "Gender"), {
      age: age
    })
    .then(() => {
      alert('Data added successfully');
	  console.log (docm.id);
	
    })
    .catch((error) => {
      console.error(error);
      alert(error.message);
    });

    document.querySelector('#me').innerHTML = `age: ${age}`;
  }
}

window.addEventListener("DOMContentLoaded", () => {
  document.querySelector('#click').addEventListener('click', submit);
});
</script>

</head>
	
 
<body>

<input type="number" id="age"> 
<button id="click">Submit</button>
<h1 id='me'></h1>

 
</script>
</body>
</html>
